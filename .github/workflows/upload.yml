name: Update Dulo XML on Google Drive

on:
  push:
    paths:
      - 'dulo.xml'

jobs:
  upload_to_drive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Fresh Access Token
        id: auth
        run: |
          # Uses Google's standard open client ID parameters to accept playground tokens
          RESPONSE=$(curl -s -X POST "https://googleapis.com" \
            -d "client_id=://googleusercontent.com" \
            -d "client_secret=dE" \
            -d "refresh_token=${{ secrets.GOOGLE_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          
          ACCESS_TOKEN=$(echo "$RESPONSE" | grep -oP '"access_token": "\K[^"]+')
          
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Error: Failed to retrieve access token. Check your GOOGLE_REFRESH_TOKEN secret."
            echo "Google Response: $RESPONSE"
            exit 1
          fi
          
          echo "::add-mask::$ACCESS_TOKEN"
          echo "token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Overwrite Google Drive File (Keep ID)
        run: |
          curl -X PATCH "https://googleapis.com" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: application/xml" \
            --data-binary "@dulo.xml"

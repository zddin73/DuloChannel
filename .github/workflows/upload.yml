name: Update XML on Google Drive

on:
  push:
    paths:
      - 'dulo.xml'

jobs:
  upload_to_drive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Upload and Overwrite File via Python
        env:
          REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          import os
          import requests

          base_auth_url = "".join(["https://", "oauth2", ".googleapis", ".com", "/token"])
          base_drive_url = "".join(["https://", "www", ".googleapis", ".com", "/upload/drive/v3/files/"])
          
          # Universal credentials that match Google's native authorization apps
          token_data = {
              "client_id": "607490013233-itf07g944stndb6or3g16v3stbftc1m6.apps.googleusercontent.com",
              "client_secret": "dE",
              "refresh_token": os.environ["REFRESH_TOKEN"],
              "grant_type": "refresh_token"
          }
          
          response = requests.post(base_auth_url, data=token_data)
          
          if response.status_code != 200:
              print(f"Auth Failed! Status Code: {response.status_code}")
              print(f"Details: {response.text}")
              exit(1)
              
          access_token = response.json().get("access_token")

          file_id = "19de7qd0hoooanQgcd1BYYxFk3V20e-yD"
          upload_url = f"{base_drive_url}{file_id}?uploadType=media&keepRevisionForever=false"
          
          upload_headers = {
              "Authorization": f"Bearer {access_token}",
              "Content-Type": "application/xml"
          }
          
          with open("dulo.xml", "rb") as f:
              xml_data = f.read()
              
          upload_res = requests.patch(upload_url, headers=upload_headers, data=xml_data)
          
          if upload_res.status_code == 200:
              print("Success! Google Drive file content replaced while keeping the same share link.")
          else:
              print(f"Upload failed with status code {upload_res.status_code}")
              print(f"Upload Details: {upload_res.text}")
              exit(1)
        shell: python
